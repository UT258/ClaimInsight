# ============================================================
# Data Ingestion Service - Shared Application Configuration
# ClaimInsight360 Microservice 2
# ============================================================

server:
  port: 8082

spring:
  application:
    name: data-ingestion-service
  profiles:
    default: dev
  main:
    lazy-initialization: true   # defer bean creation → ~40% faster startup
    banner-mode: off
  output:
    ansi:
      enabled: always
  datasource:
    hikari:
      minimum-idle: 2           # default 10 — only 2 idle connections on startup
      maximum-pool-size: 5      # default 10
      connection-timeout: 20000 # 20s
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=5m
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ---- Eureka ---------------------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5             # default 30
    initial-instance-info-replication-interval-seconds: 5  # default 40
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10          # default 30
    lease-expiration-duration-in-seconds: 20       # default 90

# ---- Actuator + Zipkin (single management block) --------------------------
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    httpexchanges:
      enabled: true
  info:
    env:
      enabled: true
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 0.1   # was 1.0 — reduce Zipkin overhead in dev

info:
  app:
    name: Data Ingestion Service
    description: ClaimInsight360 - Microservice 2 - Data Ingestion and Claim Data Aggregator
    version: 1.0.0

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ---- Logging ----------------------------------------------------------------
logging:
  level:
    com.claiminsight.ingestion.aspect: INFO
    com.claiminsight.ingestion: INFO
    org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator: ERROR
    org.springdoc.core.configuration.SpringDocAppInitializer: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
