# ============================================================
# error.properties — Centralised validation error messages
# Messages are looked up by key: {AnnotationName.objectName.fieldName}
# The DTO annotation must reference the key: message = "{key}"
# ============================================================

# --- DataFeedRequestDTO ---
NotBlank.dataFeedRequestDTO.feedType=feedType is required
NotBlank.dataFeedRequestDTO.sourceSystem=sourceSystem is required
NotBlank.dataFeedRequestDTO.status=status is required
Size.dataFeedRequestDTO.feedType=feedType must not exceed 20 characters
Size.dataFeedRequestDTO.sourceSystem=sourceSystem must be between 2 and 100 characters
Size.dataFeedRequestDTO.status=status must not exceed 20 characters
Pattern.dataFeedRequestDTO.feedType=feedType must contain letters only (e.g. CLAIM, POLICY)
Pattern.dataFeedRequestDTO.status=status must contain letters only (e.g. ACTIVE, INACTIVE)

# --- FeedStatusUpdateDTO ---
NotBlank.feedStatusUpdateDTO.status=status is required
Size.feedStatusUpdateDTO.status=status must not exceed 20 characters
Pattern.feedStatusUpdateDTO.status=status must contain letters only (e.g. ACTIVE, FAILED)

# --- IngestionRequestDTO ---
NotBlank.ingestionRequestDTO.claimId=claimId is required
NotNull.ingestionRequestDTO.feedId=feedId is required
NotBlank.ingestionRequestDTO.payloadJson=payloadJson is required
Size.ingestionRequestDTO.claimId=claimId must be between 3 and 100 characters
Positive.ingestionRequestDTO.feedId=feedId must be a positive number
Pattern.ingestionRequestDTO.claimId=claimId must contain only letters, digits, hyphens or underscores
