# ============================================================
# Development Profile
# Local development with MySQL and DevTools
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/claiminsight_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  sql:
    init:
      mode: never
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
